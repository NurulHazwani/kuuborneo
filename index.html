<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homepage Header</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <!----------------------------------------Header--------------------------------------------->
<header class="header">
    <!-- LEFT -->
    <div class="header-left">
        <img src="kuub logo.png" alt="UASR Logo" class="logo">
        <div class="title">KUUBORNEO</div>
    </div>

    <!-- RIGHT -->
    <div class="header-right">
        <nav class="nav">
            <a href="#" class="active">Home</a>
            <a href="#">About UASR</a>
            <a href="#">News</a>
            <a href="#">Events</a>
            <a href="#">S&amp;R</a>
            <a href="#">Download</a>
            <a href="#">Contact us</a>
        </nav>

        <div class="search">🔍</div>
    </div>
</header>



<!-- Main Content Wrapper -->
    <div class="container">

<!----------------------------------------Carousel--------------------------------------------->
<div id="carouselExampleIndicators" class="carousel slide">

  <!-- Indicators -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
  </div>

  <!-- Slides -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="slide 1.jpg" class="carousel-img" alt="Slide 1">
    </div>
    <div class="carousel-item">
      <img src="slide 2.jpg" class="carousel-img" alt="Slide 2">
    </div>
  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

<!----------------------------------------Carousel--------------------------------------------->

    </div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
